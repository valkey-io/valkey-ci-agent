repos:
  - repo: valkey-io/valkey
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    build_commands:
      - "make -j$(nproc)"
    validation_rules:
      - paths:
          - "tests/unit/cluster/cli.tcl"
        commands:
          - "./runtest --clients 1 --single unit/cluster/cli"
      - paths:
          - "src/cluster_legacy.c"
          - "src/cluster_migrateslots.c"
          - "tests/unit/cluster/*migration*.tcl"
        commands:
          - "./runtest --clients 1 --single unit/cluster/slot-migration"
    backport_label: backport
    llm_conflict_label: ai-resolved-conflicts
    max_conflicting_files: 100
    branches:
      - branch: "7.2"
        project_number: 1
      - branch: "8.0"
        project_number: 2
      - branch: "8.1"
        project_number: 14
      - branch: "9.0"
        project_number: 18
      - branch: "9.1"
        project_number: 41
