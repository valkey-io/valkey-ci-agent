# Example registry showing how to onboard a Valkey module.
# This file is for documentation only — the live registry is repos.yml at the repo root.
#
# Standard deployment model:
#
# Direct push: omit push_repo. The agent pushes branches directly to the
# upstream repo and opens a PR from that branch against the target release
# branch. Requires the GitHub App to have contents:write on the upstream repo.
# This scales cleanly across modules because onboarding a repo is only a
# registry edit plus GitHub App installation permissions; no staging repo is
# needed. Branches are temporary and deleted after merge.
#
# Emergency/testing escape hatch:
#
# Set push_repo only for a real fork when maintainers explicitly do not want
# agent branches on the upstream repo. Do not create org-owned staging repos
# for normal Valkey module onboarding.

publish_guard:
  # Repos listed below are protected automatically; use this only for extra
  # write targets outside the registry.
  protected_repos: []

repos:
  - repo: valkey-io/valkey
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    build_commands:
      - "make -j$(nproc)"
    backport_label: backport
    llm_conflict_label: ai-resolved-conflicts
    max_conflicting_files: 100
    branches:
      - branch: "7.2"
        project_number: 1
      - branch: "8.0"
        project_number: 2
      - branch: "8.1"
        project_number: 14
      - branch: "9.0"
        project_number: 18
      - branch: "9.1"
        project_number: 41

  - repo: valkey-io/valkey-bloom
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    build_commands:
      - "make -j$(nproc)"
    branches:
      - branch: "1.0"
        project_number: 5

  - repo: valkey-io/valkey-search
    project_owner: valkey-io
    project_owner_type: organization
    language: c++
    build_commands:
      - "cmake --build build -j$(nproc)"
    branches:
      - branch: "1.0"
        project_number: 8
