# Example registry showing how to onboard a Valkey module.
# This file is for documentation only — the live registry is repos.yml at the repo root.
#
# Standard deployment model:
#
# The agent pushes `agent/backport/...` branches directly to repo and opens
# draft PRs in that same upstream repository. `push_repo` is optional and only
# for a different-owner fork escape hatch.

repos:
  - repo: valkey-io/valkey
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    build_commands:
      - "make -j$(nproc)"
    backport_label: backport
    llm_conflict_label: ai-resolved-conflicts
    max_conflicting_files: 100
    branches:
      - branch: "7.2"
        project_number: 1
      - branch: "8.0"
        project_number: 2
      - branch: "8.1"
        project_number: 14
      - branch: "9.0"
        project_number: 18
      - branch: "9.1"
        project_number: 41

  - repo: valkey-io/valkey-bloom
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    build_commands:
      - "make -j$(nproc)"
    branches:
      - branch: "1.0"
        project_number: 5

  - repo: valkey-io/valkey-search
    project_owner: valkey-io
    project_owner_type: organization
    language: c++
    validation_setup_commands:
      - "docker build -t valkey-search-backport -f .devcontainer/Dockerfile ."
    build_commands:
      - "docker run --privileged --rm -v \"$(pwd):/workspace\" --user \"ubuntu:ubuntu\" valkey-search-backport sudo ci/build_ubuntu.sh"
    validate_each_candidate: true
    branches:
      - branch: "1.0"
        project_number: 8
