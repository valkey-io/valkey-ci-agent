# Example registry showing how to onboard a Valkey module.
# This file is for documentation only — the live registry is repos.yml at the repo root.
#
# Standard deployment model:
#
# Each upstream repo has a configured staging fork. The agent pushes
# `agent/backport/...` branches to push_repo and opens PRs against repo.
# This keeps generated branches out of upstream repositories while retaining
# one central registry for all modules.

repos:
  - repo: valkey-io/valkey
    push_repo: valkey-io/valkey-backport-staging
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    build_commands:
      - "make -j$(nproc)"
    validation_rules:
      - paths:
          - "tests/unit/cluster/cli.tcl"
        commands:
          - "./runtest --clients 1 --single unit/cluster/cli"
      - paths:
          - "src/cluster_legacy.c"
          - "src/cluster_migrateslots.c"
          - "tests/unit/cluster/*migration*.tcl"
        commands:
          - "./runtest --clients 1 --single unit/cluster/slot-migration"
    backport_label: backport
    llm_conflict_label: ai-resolved-conflicts
    max_conflicting_files: 100
    branches:
      - branch: "7.2"
        project_number: 1
      - branch: "8.0"
        project_number: 2
      - branch: "8.1"
        project_number: 14
      - branch: "9.0"
        project_number: 18
      - branch: "9.1"
        project_number: 41

  - repo: valkey-io/valkey-bloom
    push_repo: valkey-io/valkey-bloom-backport-staging
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    build_commands:
      - "make -j$(nproc)"
    branches:
      - branch: "1.0"
        project_number: 5

  - repo: valkey-io/valkey-search
    push_repo: valkey-io/valkey-search-backport-staging
    project_owner: valkey-io
    project_owner_type: organization
    language: c++
    build_commands:
      - "cmake --build build -j$(nproc)"
    branches:
      - branch: "1.0"
        project_number: 8
