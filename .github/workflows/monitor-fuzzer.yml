name: Monitor Valkey Fuzzer Runs

on:
  schedule:
    - cron: "41 */4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List the candidate run without analyzing or filing an issue."
        required: false
        default: false
        type: boolean

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: monitor-valkey-fuzzer
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      CLAUDE_CODE_USE_BEDROCK: "1"
      CI_AGENT_EVIDENCE_DIR: agent-evidence
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && 'true' || 'false' }}
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code@2.1.153

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io
          repositories: valkey-fuzzer
          permission-actions: read
          permission-contents: read
          permission-issues: write
          permission-metadata: read

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-fuzzer-monitor-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Analyze the latest fuzzer run
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail
          args=(-m scripts.fuzzer.main --output fuzzer-monitor-result.json)
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          python "${args[@]}"

      - name: Upload fuzzer analysis result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: valkey-fuzzer-monitor-result-${{ github.run_id }}
          path: fuzzer-monitor-result.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload agent evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: valkey-fuzzer-agent-evidence-${{ github.run_id }}
          path: agent-evidence
          if-no-files-found: ignore
          retention-days: 30
